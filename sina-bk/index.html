<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pomodoro Timer</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <div class="container glass">
       <header>  
            <div class="logo-container">
                <h1>Pomodoro Timer</h1>
                <img src="pomodoro_icon.png" alt="Pomodoro Timer" class="logo-img">
            </div>
        </header>
        <div class="mode-selector">
            <button id="work-mode" class="mode-btn active">Work</button>
            <button id="break-mode" class="mode-btn">Short Break</button>
            <button id="long-break-mode" class="mode-btn">Long Break</button>
        </div>

        <div class="timer-display">
            <span id="minutes">25</span>
            <span class="colon">:</span>
            <span id="seconds">00</span>
        </div>

        <div class="settings">
            <div class="input-group">
                <label for="work-time">(Work(min)</label>
                <input type="number" id="work-time" value="25" min="1" max="60">
            </div>
            <div class="input-group">
                <label for="break-time">+ Short(min))</label>
                <input type="number" id="break-time" value="5" min="1" max="60">
            </div>
            <div class="input-group">
                <label for="cycles-count">*Rounds</label>
                <input type="number" id="cycles-count" value="4" min="1" max="10">
            </div>
            <div class="input-group">
                <label for="long-break-time">+ Long(min)</label>
                <input type="number" id="long-break-time" value="15" min="1" max="60">
            </div>
        </div>

        <div class="cycle-status"
            style="text-align: center; margin-bottom: 2rem; color: var(--text-secondary); font-size: 1.1rem;">
            Round <span id="current-round">1</span> / <span id="total-rounds">4</span>
        </div>

        <div class="controls">
            <button id="start-btn" class="control-btn big">Start</button>
            <button id="reset-btn" class="control-btn icon" aria-label="Reset">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 12a9 9 0 1 0 9-9 9.75 9 0 0 0-6.74 2.74L3 8" />
                    <path d="M3 3v5h5" />
                </svg>
            </button>
        </div>

        <div class="history-container">
            <h3>Session History</h3>
            <ul id="history-list">
                <!-- History items will be added here -->
            </ul>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
